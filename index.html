<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Website</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="animation">
      <svg id="canvas"></svg>
    </div>
    <div class="grid-container"></div>
    <div id="navigation-container">
      <div id="logo-container">
        <img src="./public/logoWhite.svg" alt="logo" id="logo-image" />
      </div>
      <div id="navigation-bar">
        <ul id="navigation-items">
          <li class="navigation-item">About</li>
          <li class="navigation-item">Projects</li>
          <li class="navigation-item">Home</li>
          <li class="navigation-item">Home</li>
        </ul>
      </div>
    </div>
    <div id="name-container">
      <p id="name">Naman<br />Sharma</p>
    </div>
    <div id="about-us">
      <div id="cloud-background-container">
        <video
          autoplay
          muted
          loop
          playsinline
          src="./public/video.mp4"
          id="cloud-background"
        ></video>
      </div>
      <div id="about-us-heading">
        <p id="about-us-text">About Me</p>
      </div>
      
      <div class="about-img"></div>
      <div id="about-content-container">
        <div id="about-content"></div>
      </div>
    </div>
    <div id="technical-skills">
      Skills
    </div>
  </body>
  <script src="script.js"></script>
</html>
